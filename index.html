<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot Binance Demo + Chart Live</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI, Roboto; }
    body { background:#0f172a; color:#f1f5f9; padding:16px; max-width:1100px; margin:0 auto; }
    .grid { display:grid; grid-template-columns: 3fr 2fr; gap:20px; }
    @media(max-width:900px) { .grid { grid-template-columns:1fr; } }
    .card { background:#1e293b; border-radius:14px; padding:20px; border:1px solid #334155; margin-bottom:16px; }
    h1 { text-align:center; color:#38bdf8; margin-bottom:20px; font-size:22px; }
    .big-balance { font-size:38px; font-weight:700; color:#10b981; margin:10px 0; }
    .price-box { background:#0f172a; padding:12px; border-radius:8px; margin:10px 0; text-align:center; font-size:20px; color:#fbbf24; font-weight:bold; }
    #chart { height:420px; border-radius:10px; background:#0f172a; }
    .controls { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:20px 0; }
    button { padding:15px; border-radius:10px; border:none; font-weight:bold; font-size:17px; cursor:pointer; }
    .buy { background:#16a34a; color:white; }
    .sell { background:#dc2626; color:white; }
    .info { background:#334155; padding:12px; border-radius:8px; font-size:14px; margin:8px 0; }
    .log { background:#0f172a; padding:12px; border-radius:8px; height:180px; overflow:auto; font-size:13px; }
    .pulse { animation:pulse 2s infinite; } @keyframes pulse{0%{opacity:1;}}
  </style>
</head>
<body>
  <h1>🤖 BOT TRADING DEMO • LIVE CHART BTC/USDT</h1>
  <div class="grid">
    <!-- Kolom Kiri: Chart -->
    <div class="card">
      <h3>📈 CHART LIVE BTC/USDT (BINANCE TESTNET)</h3>
      <div id="chart"></div>
      <div class="info">Sumber: demo.binance.com | Data: WebSocket langsung</div>
    </div>

    <!-- Kolom Kanan: Kontrol Bot -->
    <div class="card">
      <h3>📊 SALDO & POSISI</h3>
      <div class="big-balance pulse" id="usdt">0.00 USDT</div>
      <div>Harga <span id="symbol">BTCUSDT</span>:</div>
      <div class="price-box" id="currentPrice">0.00</div>
      <div>Posisi: <span id="coin">0.000000 BTC</span></div>

      <div class="info">⚙️ Pengaturan: <b>5% Saldo | SL 3% | TP 6%</b></div>
      <div class="controls">
        <button class="buy" onclick="doAction('buy')">BUY + SL/TP</button>
        <button class="sell" onclick="doAction('sell')">SELL SEMUA</button>
      </div>

      <div class="info">📝 LOG TRANSAKSI:</div>
      <div class="log" id="log">Menunggu data...</div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby8-0cGqPGq8dbcAW5jlL-Mqopxm7EOkCI3Te4qqLp98pAHyMfpWmTgGSVlha-Q01kGIw/exec";
    const WS_URL = "wss://testnet.binance.vision/ws/btcusdt@kline_1m";
    let chart, candleSeries, socket;

    // Inisialisasi Chart
    function initChart() {
      chart = LightweightCharts.createChart(document.getElementById('chart'), { width: document.getElementById('chart').clientWidth, height:420, layout:{background:{color:'#0f172a'}, textColor:'#d1d5db'}, grid:{vertLines:{color:'#1f2937'}, horzLines:{color:'#1f2937'}}, timeScale:{timeVisible:true, borderColor:'#4b5563'}, rightPriceScale:{borderColor:'#4b5563'} });
      candleSeries = chart.addCandlestickSeries({ upColor:'#10b981', downColor:'#ef4444', borderUpColor:'#10b981', borderDownColor:'#ef4444', wickUpColor:'#10b981', wickDownColor:'#ef4444' });
      loadHistory();
      connectWS();
    }

    // Muat data awal
    async function loadHistory() {
      try {
        const res = await fetch("https://testnet.binance.vision/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=60");
        const data = await res.json();
        const bars = data.map(d => ({ time: d[0]/1000, open: +d[1], high: +d[2], low: +d[3], close: +d[4] }));
        candleSeries.setData(bars);
      } catch (e) { console.log("Gagal muat riwayat"); }
    }

    // Koneksi WebSocket LIVE
    function connectWS() {
      socket = new WebSocket(WS_URL);
      socket.onmessage = e => {
        const d = JSON.parse(e.data).k;
        const bar = { time: d.t/1000, open: +d.o, high: +d.h, low: +d.l, close: +d.c };
        candleSeries.update(bar);
        document.getElementById("currentPrice").textContent = `$${parseFloat(d.c).toFixed(2)}`;
      };
      socket.onclose = () => setTimeout(connectWS, 3000);
    }

    // Refresh data bot
    async function refreshBot() {
      try {
        const r = await fetch(GAS_URL + "?nocache=" + Date.now());
        const d = await r.json();
        document.getElementById("usdt").textContent = `${d.usdt} USDT`;
        document.getElementById("coin").textContent = `${d.coin} BTC`;
      } catch (e) { log("❌ Gagal sinkron data"); }
    }

    // Jalankan Aksi
    async function doAction(type) {
      log(`🔄 Memproses ${type.toUpperCase()}...`);
      try {
        const res = await fetch(GAS_URL + "?action=" + type + "&nocache=" + Date.now());
        const d = await res.json();
        if(d.success) log(`✅ ${d.action} sukses! ${d.sl ? `SL:${d.sl} | TP:${d.tp}` : ''}`);
        else log(`❌ ${d.error || 'Gagal'}`);
        refreshBot();
      } catch (e) { log("❌ Kesalahan koneksi"); }
    }

    function log(text) { document.getElementById("log").innerHTML = `${new Date().toLocaleTimeString()} ➜ ${text}<br>` + document.getElementById("log").innerHTML; }

    initChart(); refreshBot();
    setInterval(refreshBot, 8000);
    window.addEventListener('resize', () => chart.applyOptions({ width: document.getElementById('chart').clientWidth }));
  </script>
</body>
</html>
